<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#111;color:#fff;font:11px monospace}
  #app{display:flex;flex-direction:column;height:100dvh}
  #info{padding:6px;background:#222;white-space:pre-wrap;overflow:auto;flex-shrink:0;max-height:35%}
  #bc{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#000;position:relative}
  #bw{position:relative;max-width:100%;max-height:100%}
  #bi{display:block;max-width:100%;max-height:100%;object-fit:contain}
  #ov{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
  .d{position:absolute;width:14px;height:14px;border-radius:50%;background:rgba(255,0,0,.7);border:2px solid #ff0;transform:translate(-50%,-50%);pointer-events:none;font-size:7px;color:#000;display:flex;align-items:center;justify-content:center;font-weight:bold}
</style>
</head><body>
<div id="app">
  <div id="info">Loading...</div>
  <div id="bc">
    <div id="bw">
      <img id="bi" src="/caesar-board.jpg">
      <div id="ov"></div>
    </div>
  </div>
</div>
<script>
var S=[
  {id:0,x:37.8,y:4.9},{id:1,x:43.7,y:4.9},{id:2,x:49.2,y:4.9},
  {id:3,x:23.2,y:9.1},{id:4,x:23.2,y:12.8},
  {id:8,x:23.2,y:21.5},{id:9,x:28.4,y:21.5},
  {id:15,x:13.7,y:34.2},{id:16,x:18.9,y:34.2},
  {id:17,x:56.7,y:32.4},{id:18,x:61.9,y:32.4},
  {id:25,x:12.3,y:47.4},
  {id:33,x:35.0,y:80.1},{id:34,x:73.8,y:76.9},
];
var img=document.getElementById('bi');
function run(){
  var ir=img.getBoundingClientRect();
  var wr=document.getElementById('bw').getBoundingClientRect();
  var cr=document.getElementById('bc').getBoundingClientRect();
  var or2=document.getElementById('ov').getBoundingClientRect();
  var t='';
  t+='screen: '+screen.width+'x'+screen.height+' dpr:'+devicePixelRatio+'\n';
  t+='container: '+Math.round(cr.width)+'x'+Math.round(cr.height)+'\n';
  t+='wrap: '+Math.round(wr.width)+'x'+Math.round(wr.height)+' @('+Math.round(wr.left)+','+Math.round(wr.top)+')\n';
  t+='img: '+Math.round(ir.width)+'x'+Math.round(ir.height)+' @('+Math.round(ir.left)+','+Math.round(ir.top)+')\n';
  t+='overlay: '+Math.round(or2.width)+'x'+Math.round(or2.height)+' @('+Math.round(or2.left)+','+Math.round(or2.top)+')\n';
  t+='natural: '+img.naturalWidth+'x'+img.naturalHeight+'\n';
  t+='css: '+img.offsetWidth+'x'+img.offsetHeight+'\n';
  t+='img==overlay? '+(Math.abs(ir.width-or2.width)<1&&Math.abs(ir.height-or2.height)<1)+'\n';
  t+='img pos==ov pos? '+(Math.abs(ir.left-or2.left)<1&&Math.abs(ir.top-or2.top)<1)+'\n';
  t+='width-constrained: '+(Math.abs(ir.width-cr.width)<2)+'\n';
  t+='height-constrained: '+(Math.abs(ir.height-cr.height)<2)+'\n';
  document.getElementById('info').textContent=t;
  var h='';
  for(var i=0;i<S.length;i++) h+='<div class="d" style="left:'+S[i].x+'%;top:'+S[i].y+'%">'+S[i].id+'</div>';
  document.getElementById('ov').innerHTML=h;
}
if(img.complete)run();else img.onload=run;
window.addEventListener('resize',run);
</script>
</body></html>
