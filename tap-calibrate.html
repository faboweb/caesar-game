<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tap Calibrate</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#111;color:#fff;font:11px monospace;user-select:none;-webkit-user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent}
  #app{display:flex;flex-direction:column;height:100dvh}
  #info{padding:4px 8px;background:#222;flex-shrink:0;min-height:32px;display:flex;align-items:center;justify-content:space-between}
  #info b{color:#ffd700}
  #bc{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#000;position:relative}
  #bw{position:relative;display:flex;align-items:center;justify-content:center;width:100%;height:100%}
  #bi{display:block;max-width:100%;max-height:100%}
  #ov{position:absolute;pointer-events:none}
  .dot{position:absolute;transform:translate(-50%,-50%);border-radius:50%;background:rgba(255,50,50,0.6);border:2px solid #ff0;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:bold;color:#000;pointer-events:none}
  #btns{display:flex;gap:4px;padding:4px;background:#222;flex-shrink:0}
  .b{flex:1;padding:8px;background:#333;color:#fff;border:1px solid #666;border-radius:4px;font-size:11px;cursor:pointer;text-align:center}
  .b:active{background:#ffd700;color:#000}
  #out{padding:4px;background:#1a1a1a;font-size:8px;max-height:80px;overflow-y:auto;white-space:pre;flex-shrink:0;border-top:1px solid #333}
  /* Magnifier */
  #mag{position:fixed;width:130px;height:130px;border-radius:50%;border:3px solid #c9a84c;box-shadow:0 4px 20px rgba(0,0,0,.7);overflow:hidden;pointer-events:none;z-index:200;display:none;background-repeat:no-repeat}
  #mag.show{display:block}
  #mag-cross{position:absolute;top:50%;left:50%;width:12px;height:12px;transform:translate(-50%,-50%);border:1.5px solid rgba(255,215,0,.7);border-radius:50%}
</style>
</head><body>
<div id="app">
  <div id="info">
    <span>Tap slot <b id="cur">0</b>/34 — <span id="desc"></span></span>
    <span id="count">0 done</span>
  </div>
  <div id="bc">
    <div id="bw">
      <img id="bi" src="/caesar-board.jpg">
      <div id="ov"></div>
    </div>
  </div>
  <div id="btns">
    <div class="b" id="undo">Undo</div>
    <div class="b" id="skip">Skip</div>
    <div class="b" id="copy">Copy JSON</div>
  </div>
  <div id="out"></div>
</div>
<div id="mag"><div id="mag-cross"></div></div>
<script>
var DESCS=[
  'H.Ult↔H.Cit #1','H.Ult↔H.Cit #2','H.Ult↔H.Cit #3',
  'H.Ult↔Maur #1','H.Ult↔Maur #2',
  'H.Cit↔Sard','H.Cit↔Gall',
  'Maur↔Sard',
  'Maur↔Num #1','Maur↔Num #2',
  'Gall↔G.Cis #1','Gall↔G.Cis #2',
  'Sard↔G.Cis',
  'Sard↔Sic',
  'Num↔Sic',
  'Num↔Afr #1','Num↔Afr #2',
  'Sic↔Ital #1','Sic↔Ital #2',
  'G.Cis↔Ital',
  'G.Cis↔Dalm',
  'Ital↔Dalm',
  'Ital↔Ach',
  'Dalm↔Mac',
  'Afr↔Sic',
  'Afr↔Cyr',
  'Ach↔Mac',
  'Ach↔Cyr',
  'Ach↔Cret',
  'Cret↔Aeg',
  'Cret↔Asia',
  'Cyr↔Aeg',
  'Asia↔Mac',
  'Aeg↔Syr',
  'Asia↔Syr',
];
var pts=[], cur=0;
var mag=document.getElementById('mag');

function getImgRect(){
  var img=document.getElementById('bi');
  return img.getBoundingClientRect();
}

function sizeOverlay(){
  var img=document.getElementById('bi');
  var ov=document.getElementById('ov');
  var wrap=document.getElementById('bw');
  var ir=img.getBoundingClientRect();
  var wr=wrap.getBoundingClientRect();
  ov.style.left=(ir.left-wr.left)+'px';
  ov.style.top=(ir.top-wr.top)+'px';
  ov.style.width=ir.width+'px';
  ov.style.height=ir.height+'px';
}

function ui(){
  document.getElementById('cur').textContent=cur;
  document.getElementById('desc').textContent=cur<DESCS.length?DESCS[cur]:'DONE!';
  document.getElementById('count').textContent=pts.filter(Boolean).length+' done';
  sizeOverlay();
  var ov=document.getElementById('ov');
  var ir=getImgRect();
  var cs=ir.height*0.055;
  var h='';
  for(var i=0;i<pts.length;i++){
    if(!pts[i])continue;
    h+='<div class="dot" style="left:'+pts[i].x+'%;top:'+pts[i].y+'%;width:'+cs+'px;height:'+cs+'px">'+i+'</div>';
  }
  ov.innerHTML=h;
  // output
  var o='';
  for(var i=0;i<pts.length;i++){
    if(!pts[i]){o+='  // '+i+': skipped\n';continue;}
    o+='  { id:'+i+', x:'+pts[i].x.toFixed(1)+', y:'+pts[i].y.toFixed(1)+' },\n';
  }
  document.getElementById('out').textContent=o;
}

// Tap on board to record position
document.getElementById('bc').addEventListener('pointerdown',function(e){
  if(cur>=DESCS.length)return;
  // Show magnifier
  showMag(e.clientX,e.clientY);
});

document.getElementById('bc').addEventListener('pointermove',function(e){
  if(cur>=DESCS.length)return;
  showMag(e.clientX,e.clientY);
});

document.getElementById('bc').addEventListener('pointerup',function(e){
  mag.classList.remove('show');
  if(cur>=DESCS.length)return;
  var ir=getImgRect();
  var x=((e.clientX-ir.left)/ir.width)*100;
  var y=((e.clientY-ir.top)/ir.height)*100;
  if(x<-5||x>105||y<-5||y>105)return;
  pts[cur]={x:x,y:y};
  cur++;
  ui();
});

function showMag(cx,cy){
  var img=document.getElementById('bi');
  var ir=img.getBoundingClientRect();
  var zoom=2.5,sz=130;
  var bgW=ir.width*zoom,bgH=ir.height*zoom;
  var relX=(cx-ir.left)/ir.width,relY=(cy-ir.top)/ir.height;
  var bgX=-(relX*bgW-sz/2),bgY=-(relY*bgH-sz/2);
  mag.style.left=(cx-sz/2)+'px';
  mag.style.top=Math.max(5,cy-sz-30)+'px';
  mag.style.backgroundImage='url('+img.src+')';
  mag.style.backgroundSize=bgW+'px '+bgH+'px';
  mag.style.backgroundPosition=bgX+'px '+bgY+'px';
  mag.classList.add('show');
}

document.getElementById('undo').addEventListener('click',function(){
  if(cur>0){cur--;pts.length=cur;ui();}
});
document.getElementById('skip').addEventListener('click',function(){
  if(cur<DESCS.length){pts[cur]=null;cur++;ui();}
});
document.getElementById('copy').addEventListener('click',function(){
  navigator.clipboard.writeText(document.getElementById('out').textContent).then(function(){alert('Copied!');});
});

var img=document.getElementById('bi');
function init(){sizeOverlay();ui();}
if(img.complete)init();else img.onload=init;
window.addEventListener('resize',function(){sizeOverlay();ui();});
</script>
</body></html>
