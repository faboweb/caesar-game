<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Caesar!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #1a1008;
    color: #f5f0e8;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* Header */
  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 10px;
    background: #0e0a04;
    border-bottom: 2px solid #c9a84c;
    min-height: 36px;
    flex-shrink: 0;
  }
  .player-name { font-size: 15px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
  .player-name.caesar { color: #e55; }
  .player-name.pompey { color: #5a9ee5; }
  .bag-count { font-size: 11px; opacity: 0.6; margin-left: 6px; }
  .markers { font-size: 12px; color: #c9a84c; }

  /* Board */
  #board-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0e0a04;
  }
  #board-wrap {
    position: relative;
    display: inline-block;
  }
  #board-img {
    display: block;
    width: auto;
    height: auto;
    max-width: 100%;
    max-height: 100%;
  }
  #board-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }
  #board-overlay .hit { pointer-events: all; cursor: pointer; }

  /* Hand panel */
  #hand-panel {
    flex-shrink: 0;
    background: #0e0a04;
    border-top: 2px solid #c9a84c;
    padding: 6px 8px;
  }
  #hand-tokens {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    min-height: 56px;
    align-items: center;
    scrollbar-width: none;
  }
  #hand-tokens::-webkit-scrollbar { display: none; }

  .hand-token {
    flex-shrink: 0;
    width: 54px; height: 54px;
    border-radius: 50%;
    border: 3px solid #c9a84c;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .hand-token.selected {
    transform: scale(1.18);
    box-shadow: 0 0 14px 4px #ffd700;
    border-color: #ffd700;
  }
  .hand-token.caesar-t { background: #8b1a1a; }
  .hand-token.pompey-t { background: #1a3a6b; }
  .token-inner {
    display: flex;
    width: 100%; height: 100%;
    align-items: center; justify-content: center;
  }
  .tv { flex: 1; display: flex; align-items: center; justify-content: center;
        font-size: 18px; font-weight: bold; color: #f5f0e8; height: 100%; }
  .tv-l { border-right: 2px solid #c9a84c; }
  .token-icon {
    position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
    font-size: 10px; background: #0e0a04; border-radius: 3px; padding: 0 3px;
    color: #c9a84c; line-height: 14px;
  }
  .empty-hand {
    opacity: 0.35; padding: 14px; font-style: italic; font-size: 13px; white-space: nowrap;
  }

  /* Buttons */
  #actions { display: flex; gap: 6px; margin-top: 4px; }
  .btn {
    flex: 1; min-height: 42px; border: 2px solid #c9a84c; background: #2b1810;
    color: #f5f0e8; font-family: Georgia, serif; font-size: 13px; font-weight: bold;
    border-radius: 6px; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .btn:active { background: #c9a84c; color: #2b1810; }
  .btn:disabled { opacity: 0.3; pointer-events: none; }

  /* Menu */
  #menu-btn {
    background: none; border: 1px solid #c9a84c; color: #c9a84c;
    font-size: 18px; padding: 2px 8px; border-radius: 4px; cursor: pointer;
    line-height: 1;
  }
  #menu-btn:active { background: #c9a84c; color: #0e0a04; }
  #menu-panel {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    z-index: 150; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  #menu-panel.show { display: flex; }
  .menu-item {
    width: 220px; padding: 14px; border: 2px solid #c9a84c; background: #2b1810;
    color: #f5f0e8; font-family: Georgia, serif; font-size: 15px; font-weight: bold;
    border-radius: 8px; cursor: pointer; text-align: center; text-transform: uppercase;
    letter-spacing: 1px;
  }
  .menu-item:active { background: #c9a84c; color: #2b1810; }
  .menu-item.danger { border-color: #a33; color: #e66; }
  .menu-item.danger:active { background: #a33; color: #fff; }
  /* Rotate zoom overlay */
  #rot-zoom {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    z-index: 120; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  #rot-zoom.show { display: flex; }
  #rot-zoom .big-token {
    width: 160px; height: 160px; border-radius: 50%;
    border: 5px solid #c9a84c; display: flex; overflow: hidden;
    transition: transform 0.25s;
  }
  #rot-zoom .big-token.caesar-t { background: #8b1a1a; }
  #rot-zoom .big-token.pompey-t { background: #1a3a6b; }
  #rot-zoom .big-val {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: 48px; font-weight: bold; color: #f5f0e8;
  }
  #rot-zoom .big-val-l { border-right: 4px solid #c9a84c; }
  #rot-zoom .big-type { font-size: 28px; color: #c9a84c; }
  #rot-zoom .rot-label {
    font-size: 14px; color: #f5f0e8; opacity: 0.7; text-align: center;
  }
  #rot-zoom .rot-arrows {
    display: flex; gap: 24px; margin-top: 8px;
  }
  #rot-zoom .rot-btn {
    width: 64px; height: 64px; border-radius: 50%; border: 2px solid #c9a84c;
    background: #2b1810; color: #c9a84c; font-size: 28px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #rot-zoom .rot-btn:active { background: #c9a84c; color: #2b1810; }
  #rot-zoom .confirm-btn {
    margin-top: 12px; padding: 12px 40px; border: 2px solid #c9a84c;
    background: #2b1810; color: #f5f0e8; font-family: Georgia, serif;
    font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 1px;
  }
  #rot-zoom .confirm-btn:active { background: #c9a84c; color: #2b1810; }

  #session-id { font-size: 10px; color: #c9a84c; opacity: 0.5; margin-top: 8px; }
  #saves-list {
    max-height: 200px; overflow-y: auto; width: 220px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .save-entry {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; background: #1a1008; border: 1px solid #555;
    border-radius: 6px; cursor: pointer; font-size: 12px; color: #f5f0e8;
  }
  .save-entry:active { background: #c9a84c; color: #0e0a04; }
  .save-date { font-size: 10px; opacity: 0.5; }

  /* Overlay */
  #overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.94);
    z-index: 100; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; cursor: pointer;
  }
  #overlay.show { display: flex; }
  #overlay h2 { font-size: 26px; color: #c9a84c; text-align: center; padding: 0 24px; }
  #overlay p { font-size: 14px; opacity: 0.5; }

  /* Animations */
  @keyframes pulse { 0%,100%{opacity:.25} 50%{opacity:.65} }
  .slot-avail { animation: pulse 1.2s ease-in-out infinite; }

  /* Debug */
  .debug-label {
    font-size: 8px; fill: #ff0; pointer-events: none; font-family: monospace;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <span id="pname" class="player-name caesar">Caesar</span>
      <span id="pbag" class="bag-count">(16 in bag)</span>
    </div>
    <div id="pmarkers" class="markers">Markers: 12</div>
    <button id="menu-btn" onclick="toggleMenu()">&#9776;</button>
  </div>

  <div id="board-container">
    <div id="board-wrap">
      <img id="board-img" src="caesar-board.jpg" alt="Board">
      <svg id="board-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <div id="hand-panel">
    <div id="hand-tokens"></div>
    <div id="actions">
      <button class="btn" id="b-draw">Draw</button>
      <button class="btn" id="b-rot">Rotate</button>
      <button class="btn" id="b-mark">Marker</button>
      <button class="btn" id="b-end">End Turn</button>
    </div>
  </div>

  <div id="rot-zoom">
    <div class="big-type" id="rz-type"></div>
    <div class="big-token" id="rz-token">
      <div class="big-val big-val-l" id="rz-l"></div>
      <div class="big-val" id="rz-r"></div>
    </div>
    <div class="rot-label" id="rz-label"></div>
    <div class="rot-arrows">
      <button class="rot-btn" id="rz-flip">&#8634;</button>
    </div>
    <button class="confirm-btn" id="rz-done">Confirm</button>
  </div>

  <div id="menu-panel">
    <div style="font-size:22px;color:#c9a84c;font-weight:bold;margin-bottom:8px">CAESAR!</div>
    <div id="session-id"></div>
    <button class="menu-item" onclick="saveGame()">Save Game</button>
    <button class="menu-item" onclick="showLoads()">Load Game</button>
    <div id="saves-list"></div>
    <button class="menu-item danger" onclick="newGame()">New Game</button>
    <button class="menu-item" onclick="toggleMenu()">Resume</button>
  </div>

  <div id="overlay">
    <h2 id="ov-text">Pass device to Pompey</h2>
    <p>Tap when ready</p>
  </div>
</div>

<script>
// ── Session & Persistence ───────────────────────────────────
let SESSION = localStorage.getItem('caesar_session') || newSessionId();

function newSessionId() {
  const id = Math.random().toString(36).slice(2,8).toUpperCase();
  localStorage.setItem('caesar_session', id);
  return id;
}

function getStateSnapshot() {
  return JSON.stringify({
    cp:S.cp, bags:S.bags, hands:S.hands, board:S.board,
    markers:S.markers, bonus:S.bonus, mrem:S.mrem
  });
}

function autosave() {
  localStorage.setItem('caesar_auto_'+SESSION, getStateSnapshot());
  localStorage.setItem('caesar_auto_ts_'+SESSION, Date.now().toString());
}

function saveGame() {
  const key = 'caesar_save_'+Date.now();
  const saves = JSON.parse(localStorage.getItem('caesar_saves')||'[]');
  saves.unshift({ key, session: SESSION, ts: Date.now() });
  if(saves.length>10) { localStorage.removeItem(saves.pop().key); }
  localStorage.setItem('caesar_saves', JSON.stringify(saves));
  localStorage.setItem(key, getStateSnapshot());
  toggleMenu();
}

function showLoads() {
  const saves = JSON.parse(localStorage.getItem('caesar_saves')||'[]');
  const el = document.getElementById('saves-list');
  // Also check for autosaves
  const allKeys = Object.keys(localStorage).filter(k=>k.startsWith('caesar_auto_')&&!k.includes('_ts_'));
  let h = '';
  // Manual saves
  for(const s of saves) {
    const d = new Date(s.ts);
    const label = d.toLocaleDateString()+' '+d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    h += `<div class="save-entry" onclick="loadGame('${s.key}')">${s.session} <span class="save-date">${label}</span></div>`;
  }
  // Autosaves
  for(const k of allKeys) {
    const sid = k.replace('caesar_auto_','');
    const ts = parseInt(localStorage.getItem('caesar_auto_ts_'+sid)||'0');
    if(!ts) continue;
    const d = new Date(ts);
    const label = d.toLocaleDateString()+' '+d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const isCurrent = sid===SESSION?' (current)':'';
    h += `<div class="save-entry" onclick="loadGame('${k}')">${sid}${isCurrent} <span class="save-date">${label} auto</span></div>`;
  }
  if(!h) h='<div style="text-align:center;opacity:0.4;padding:10px">No saves</div>';
  el.innerHTML = h;
}

function loadGame(key) {
  const data = localStorage.getItem(key);
  if(!data) return;
  const snap = JSON.parse(data);
  S.cp=snap.cp; S.bags=snap.bags; S.hands=snap.hands; S.board=snap.board;
  S.markers=snap.markers; S.bonus=snap.bonus; S.mrem=snap.mrem;
  S.sel=null; S.selMarker=false;
  toggleMenu();
  render();
}

function newGame() {
  if(!confirm('Start new game? Current progress is autosaved.')) return;
  SESSION = newSessionId();
  toggleMenu();
  freshGame();
}

function toggleMenu() {
  const mp = document.getElementById('menu-panel');
  mp.classList.toggle('show');
  document.getElementById('session-id').textContent = 'Session: '+SESSION;
  document.getElementById('saves-list').innerHTML = '';
}

// ── Config ──────────────────────────────────────────────────

// Province bonus-token center positions
const PROVS = [
  { n:'Hisp. Ult.',   x:24, y:8  },
  { n:'Hisp. Cit.',   x:46, y:4  },
  { n:'Mauritania',   x:17, y:18 },
  { n:'Gallia',        x:82, y:6  },
  { n:'Sardinia',      x:42, y:17 },
  { n:'G. Cisalpina',  x:80, y:22 },
  { n:'Numidia',       x:20, y:28 },
  { n:'Sicilia',       x:40, y:32 },
  { n:'Italia',        x:58, y:33 },
  { n:'Africa',        x:10, y:41 },
  { n:'Dalmatia',      x:86, y:35 },

  { n:'Macedonia',     x:76, y:50 },
  { n:'Cyrene',        x:12, y:55 },
  { n:'Creta',         x:42, y:62 },
  { n:'Aegyptus',      x:14, y:75 },

];

const ICONS = { Sword:'\u2694\uFE0F', Shield:'\uD83D\uDEE1\uFE0F', Ship:'\u2693', Wild:'\u2618\uFE0F' };
const BONUS_ICONS = { Tactics:'\u26A1', Wealth:'\uD83D\uDCB0', Might:'\uD83D\uDCAA', Senate:'\uD83C\uDFDB\uFE0F' };

function makeTokens() {
  const t = [];
  for (const type of ['Sword','Shield']) {
    t.push({type,v:[5,1]},{type,v:[5,1]},{type,v:[4,2]},{type,v:[4,2]},{type,v:[3,3]});
  }
  t.push({type:'Ship',v:[5,1]},{type:'Ship',v:[4,2]},{type:'Ship',v:[3,3]});
  t.push({type:'Wild',v:[3,1]},{type:'Wild',v:[2,2]},{type:'Wild',v:[2,2]});
  return t; // 16 tokens
}

// ── State ───────────────────────────────────────────────────
const S = {
  cp: 0,         // current player
  bags: [[],[]],
  hands: [[],[]],
  board: [],     // {tok, slotId, rot, pl}
  markers: [],   // {pl, x, y}
  bonus: [],     // {type, pi, claimed}
  sel: null,     // selected hand index or -1 for marker
  selMarker: false,
  mrem: [12,12], // markers remaining
};

function shuffle(a) {
  for (let i=a.length-1;i>0;i--) { const j=Math.random()*i+1|0;[a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function init() {
  // Try restoring autosave for current session
  const auto = localStorage.getItem('caesar_auto_'+SESSION);
  if(auto) {
    try {
      const snap = JSON.parse(auto);
      S.cp=snap.cp; S.bags=snap.bags; S.hands=snap.hands; S.board=snap.board;
      S.markers=snap.markers; S.bonus=snap.bonus; S.mrem=snap.mrem;
      S.sel=null; S.selMarker=false;
      render();
      return;
    } catch(e) { /* fall through to fresh game */ }
  }
  freshGame();
}

function freshGame() {
  S.cp=0;
  S.bags=[shuffle(makeTokens()),shuffle(makeTokens())];
  S.hands=[[],[]];
  S.board=[];
  S.markers=[];
  S.sel=null;
  S.selMarker=false;
  S.mrem=[12,12];

  // Bonus tokens
  const types=shuffle(['Tactics','Wealth','Might','Tactics','Wealth','Might',
    'Tactics','Wealth','Might','Wealth','Might','Tactics','Might']);
  S.bonus=[];
  for(let i=0;i<PROVS.length;i++){
    if(i===8) S.bonus.push({type:'Senate',pi:i,claimed:false});
    else if(types.length) S.bonus.push({type:types.pop(),pi:i,claimed:false});
  }
  autosave();
  render();
}

// ── Coordinate helpers ──────────────────────────────────────
// SVG viewBox is 0 0 100 100, slot coords are already in percentage.
// For click handling we convert pixel clicks to percentage of image.

function getImgRect() {
  const img=document.getElementById('board-img');
  if(!img||!img.complete) return null;
  return img.getBoundingClientRect();
}

function clickToPct(clientX, clientY) {
  const r=getImgRect();
  if(!r) return null;
  return { x:(clientX-r.left)/r.width*100, y:(clientY-r.top)/r.height*100 };
}

// ── Actions ─────────────────────────────────────────────────
function draw() {
  if(!S.bags[S.cp].length) return;
  S.hands[S.cp].push({...S.bags[S.cp].pop(), rot:false});
  S.sel=null; S.selMarker=false;
  autosave(); render();
}

// ── Rotate zoom overlay ─────────────────────────────────────
// source: {where:'hand', idx} or {where:'board', slotId}
let rzSource=null;
let rzRot=false;

function openRotateZoom(tokenObj, source, slotInfo) {
  rzSource=source;
  rzRot=tokenObj.rot||false;
  const rz=document.getElementById('rot-zoom');
  const tcls=S.cp===0?'caesar-t':'pompey-t';
  document.getElementById('rz-token').className='big-token '+tcls;
  document.getElementById('rz-type').textContent=ICONS[tokenObj.type]||tokenObj.type;
  updateRotateZoomDisplay(tokenObj);

  // Label with province names if on a slot
  if(slotInfo) {
    document.getElementById('rz-label').textContent=slotInfo.p[0]+' \u2190 / \u2192 '+slotInfo.p[1];
  } else {
    document.getElementById('rz-label').textContent='Tap \u21bb to flip orientation';
  }
  rz.classList.add('show');
}

function updateRotateZoomDisplay(tokenObj) {
  const v=rzRot?[tokenObj.v[1],tokenObj.v[0]]:tokenObj.v;
  document.getElementById('rz-l').textContent=v[0];
  document.getElementById('rz-r').textContent=v[1];
}

function rzFlip() {
  if(!rzSource) return;
  rzRot=!rzRot;
  let tok;
  if(rzSource.where==='hand') tok=S.hands[S.cp][rzSource.idx];
  else {
    const bt=S.board.find(b=>b.slotId===rzSource.slotId);
    if(bt) tok=bt.tok||bt;
  }
  if(tok) updateRotateZoomDisplay(tok);
  // Animate flip
  const el=document.getElementById('rz-token');
  el.style.transform='scaleX(-1)';
  setTimeout(()=>{el.style.transform='';},200);
}

function rzConfirm() {
  if(!rzSource) return;
  if(rzSource.where==='hand') {
    const t=S.hands[S.cp][rzSource.idx];
    if(t) t.rot=rzRot;
  } else {
    const bt=S.board.find(b=>b.slotId===rzSource.slotId);
    if(bt) bt.rot=rzRot;
  }
  rzSource=null;
  document.getElementById('rot-zoom').classList.remove('show');
  autosave(); render();
}

document.getElementById('rz-flip').addEventListener('click',rzFlip);
document.getElementById('rz-done').addEventListener('click',rzConfirm);

function rotate() {
  if(S.sel===null||S.selMarker) return;
  const t=S.hands[S.cp][S.sel];
  if(t) openRotateZoom(t, {where:'hand', idx:S.sel}, null);
}

function selHand(i) {
  S.selMarker=false;
  S.sel=(S.sel===i)?null:i;
  render();
}

function selMark() {
  if(S.mrem[S.cp]<=0) return;
  S.selMarker=true; S.sel=-1;
  render();
}

function placeOnSlot(sid) {
  const ex=S.board.findIndex(b=>b.slotId===sid);
  // Pick up existing
  if(ex!==-1) {
    const b=S.board[ex];
    if(b.pl!==S.cp) return; // can't pick up opponent's token
    S.hands[S.cp].push({type:b.tok.type, v:[...b.tok.v], rot:b.rot});
    S.board.splice(ex,1);
    S.sel=null; autosave(); render();
    return;
  }
  // Place selected
  if(S.sel===null||S.selMarker) return;
  const t=S.hands[S.cp][S.sel];
  S.board.push({tok:{type:t.type,v:[...t.v]}, slotId:sid, rot:t.rot, pl:S.cp});
  S.hands[S.cp].splice(S.sel,1);
  S.sel=null; autosave(); render();
}

function boardClick(e) {
  const pct=clickToPct(e.clientX, e.clientY);
  if(!pct) return;

  // Check slots (hit radius ~2.5 in percentage units)
  for(const s of SLOTS) {
    if(Math.hypot(pct.x-s.x, pct.y-s.y)<3) { placeOnSlot(s.id); return; }
  }

  // Place marker at click position
  if(S.selMarker && S.sel===-1) {
    S.markers.push({pl:S.cp, x:pct.x, y:pct.y});
    S.mrem[S.cp]--;
    S.sel=null; S.selMarker=false;
    autosave(); render(); return;
  }

  // Pick up marker
  for(let i=S.markers.length-1;i>=0;i--) {
    const m=S.markers[i];
    if(m.pl!==S.cp) continue;
    if(Math.hypot(pct.x-m.x, pct.y-m.y)<2.5) {
      S.markers.splice(i,1);
      S.mrem[S.cp]++;
      autosave(); render(); return;
    }
  }

  // Claim bonus token
  for(const b of S.bonus) {
    if(b.claimed) continue;
    const pr=PROVS[b.pi];
    if(Math.hypot(pct.x-pr.x, pct.y-pr.y)<2.5) {
      b.claimed=true;
      autosave(); render(); return;
    }
  }
}

function endTurn() {
  S.sel=null; S.selMarker=false;
  const next=1-S.cp;
  document.getElementById('ov-text').textContent=`Pass device to ${P[next].name}`;
  const ov=document.getElementById('overlay');
  ov.classList.add('show');
  ov.onclick=()=>{ ov.classList.remove('show'); S.cp=next; autosave(); render(); };
}

function reset() { if(confirm('Reset game?')) init(); }

// ── Long press for rotate on board ──────────────────────────
let lpt=null, lpid=null;

function touchStart(e) {
  if(e.touches.length!==1) return;
  const t=e.touches[0];
  const pct=clickToPct(t.clientX, t.clientY);
  if(!pct) return;

  for(const b of S.board) {
    if(b.pl!==S.cp) continue;
    const sl=SLOTS.find(s=>s.id===b.slotId);
    if(!sl) continue;
    if(Math.hypot(pct.x-sl.x, pct.y-sl.y)<3) {
      lpid=b.slotId;
      lpt=setTimeout(()=>{
        const sl=SLOTS.find(s=>s.id===b.slotId);
        openRotateZoom(b.tok||b, {where:'board', slotId:b.slotId}, sl);
        lpt=null; lpid=null;
      },400);
      return;
    }
  }
}
function touchEnd() { if(lpt){clearTimeout(lpt);lpt=null;} lpid=null; }
function touchMove() { if(lpt){clearTimeout(lpt);lpt=null;} }

// Long press on hand token to rotate
let hlt=null;
function hts(i) {
  hlt=setTimeout(()=>{
    const t=S.hands[S.cp][i];
    if(t) openRotateZoom(t, {where:'hand', idx:i}, null);
    hlt=null;
  },400);
}
function hte() { if(hlt){clearTimeout(hlt);hlt=null;} }

// ── Render ──────────────────────────────────────────────────
function render() {
  const p=S.cp, pl=P[p];

  // Header
  document.getElementById('pname').textContent=pl.name;
  document.getElementById('pname').className='player-name '+pl.cls;
  document.getElementById('pbag').textContent=`(${S.bags[p].length} in bag)`;
  document.getElementById('pmarkers').textContent=`Markers: ${S.mrem[p]}/12`;

  // Buttons
  document.getElementById('b-draw').disabled=!S.bags[p].length;
  document.getElementById('b-rot').disabled=(S.sel===null||S.selMarker);
  document.getElementById('b-mark').disabled=S.mrem[p]<=0;

  renderOverlay();
  renderHand();
}

function renderOverlay() {
  const svg=document.getElementById('board-overlay');
  const hasSel=S.sel!==null&&!S.selMarker;
  let h='';
  // SVG viewBox is 0 0 100 100, all coords are percentages directly
  const R=1.8; // token radius in viewBox units

  // Slot targets
  for(const s of SLOTS) {
    const occ=S.board.some(b=>b.slotId===s.id);
    if(!occ && hasSel) {
      h+=`<circle class="hit slot-avail" cx="${s.x}" cy="${s.y}" r="${R}"
        fill="rgba(201,168,76,0.35)" stroke="#c9a84c" stroke-width="0.3"
        data-s="${s.id}"/>`;
    } else if(!occ) {
      h+=`<circle class="hit" cx="${s.x}" cy="${s.y}" r="${R}"
        fill="transparent" data-s="${s.id}"/>`;
    }
    if(DEBUG) {
      h+=`<text class="debug-label" x="${s.x+2}" y="${s.y+0.5}" font-size="1.2">${s.id}</text>`;
    }
  }

  // Placed tokens
  for(const b of S.board) {
    const sl=SLOTS.find(s=>s.id===b.slotId);
    if(!sl) continue;
    const c=P[b.pl];
    const v=b.rot?[b.tok.v[1],b.tok.v[0]]:b.tok.v;
    h+=`<g class="hit" data-s="${b.slotId}">`;
    h+=`<circle cx="${sl.x}" cy="${sl.y}" r="${R}" fill="${c.bg}" stroke="#c9a84c" stroke-width="0.3"/>`;
    h+=`<line x1="${sl.x}" y1="${sl.y-R}" x2="${sl.x}" y2="${sl.y+R}" stroke="#c9a84c" stroke-width="0.2"/>`;
    h+=`<text x="${sl.x-R*.45}" y="${sl.y+0.6}" text-anchor="middle" fill="#f5f0e8" font-size="1.6" font-weight="bold" font-family="Georgia">${v[0]}</text>`;
    h+=`<text x="${sl.x+R*.45}" y="${sl.y+0.6}" text-anchor="middle" fill="#f5f0e8" font-size="1.6" font-weight="bold" font-family="Georgia">${v[1]}</text>`;
    h+=`</g>`;
  }

  // Control markers
  for(let i=0;i<S.markers.length;i++) {
    const m=S.markers[i];
    h+=`<g class="hit" data-mi="${i}">`;
    h+=`<circle cx="${m.x}" cy="${m.y}" r="1.4" fill="${P[m.pl].bg}" stroke="#c9a84c" stroke-width="0.3"/>`;
    h+=`<text x="${m.x}" y="${m.y+0.5}" text-anchor="middle" fill="#c9a84c" font-size="1.2" font-weight="bold" font-family="Georgia">M</text>`;
    h+=`</g>`;
  }

  // Bonus tokens
  for(const b of S.bonus) {
    if(b.claimed) continue;
    const pr=PROVS[b.pi];
    h+=`<circle class="hit" cx="${pr.x}" cy="${pr.y}" r="1.6" fill="#d4b44c" stroke="#8a7428" stroke-width="0.2" data-bi="${b.pi}"/>`;
    h+=`<text x="${pr.x}" y="${pr.y+0.5}" text-anchor="middle" font-size="1.4" pointer-events="none">${BONUS_ICONS[b.type]||'?'}</text>`;
  }

  svg.innerHTML=h;

  // Attach listeners
  svg.querySelectorAll('[data-s]').forEach(el=>{
    const sid=+el.dataset.s;
    el.addEventListener('click',e=>{e.stopPropagation();placeOnSlot(sid);});
  });
  svg.querySelectorAll('[data-bi]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const b=S.bonus.find(b=>b.pi===+el.dataset.bi);
      if(b&&!b.claimed){b.claimed=true;autosave();render();}
    });
  });
}

function renderHand() {
  const hand=S.hands[S.cp];
  const ct=document.getElementById('hand-tokens');
  let h='';
  const tcls=S.cp===0?'caesar-t':'pompey-t';

  for(let i=0;i<hand.length;i++) {
    const t=hand[i];
    const v=t.rot?[t.v[1],t.v[0]]:t.v;
    const sel=(S.sel===i&&!S.selMarker)?' selected':'';
    h+=`<div class="hand-token ${tcls}${sel}" data-h="${i}">
      <div class="token-inner"><div class="tv tv-l">${v[0]}</div><div class="tv">${v[1]}</div></div>
      <span class="token-icon">${ICONS[t.type]||t.type}</span></div>`;
  }

  if(!hand.length) h='<div class="empty-hand">No tokens — draw from bag</div>';
  ct.innerHTML=h;

  ct.querySelectorAll('[data-h]').forEach(el=>{
    const i=+el.dataset.h;
    el.addEventListener('click',()=>selHand(i));
    el.addEventListener('touchstart',()=>hts(i),{passive:true});
    el.addEventListener('touchend',hte);
    el.addEventListener('touchmove',hte,{passive:true});
  });
}

// ── Event wiring ────────────────────────────────────────────
document.getElementById('b-draw').onclick=draw;
document.getElementById('b-rot').onclick=rotate;
document.getElementById('b-mark').onclick=selMark;
document.getElementById('b-end').onclick=endTurn;

const bc=document.getElementById('board-container');
bc.addEventListener('click',boardClick);
bc.addEventListener('touchstart',touchStart,{passive:true});
bc.addEventListener('touchend',touchEnd);
bc.addEventListener('touchmove',touchMove,{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R') rotate();
  if(e.key==='Escape'){S.sel=null;S.selMarker=false;render();}
});

window.addEventListener('resize',()=>render());

const img=document.getElementById('board-img');
if(img.complete) init(); else img.onload=init;
img.onerror=()=>{
  document.getElementById('board-wrap').innerHTML=
    '<div style="color:#c9a84c;text-align:center;padding:40px"><h2>Board image not found</h2><p>Place caesar-board.jpg next to this HTML file</p></div>';
};
</script>
</body>
</html>
