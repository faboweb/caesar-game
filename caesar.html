<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Caesar!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #1a1008;
    color: #f5f0e8;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* Header */
  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 10px;
    background: #0e0a04;
    border-bottom: 2px solid #c9a84c;
    min-height: 36px;
    flex-shrink: 0;
  }
  .player-name { font-size: 15px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
  .player-name.caesar { color: #e55; }
  .player-name.pompey { color: #5a9ee5; }
  .bag-count { font-size: 11px; opacity: 0.6; margin-left: 6px; }
  .markers { font-size: 12px; color: #c9a84c; }

  /* Board */
  #board-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0e0a04;
  }
  #board-wrap {
    position: relative;
    display: inline-block;
    max-width: 100%;
    max-height: 100%;
  }
  #board-img {
    display: block;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  #board-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #board-overlay .hit { pointer-events: all; cursor: pointer; }

  /* Hand panel */
  #hand-panel {
    flex-shrink: 0;
    background: #0e0a04;
    border-top: 2px solid #c9a84c;
    padding: 6px 8px;
  }
  #hand-tokens {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    min-height: 56px;
    align-items: center;
    scrollbar-width: none;
  }
  #hand-tokens::-webkit-scrollbar { display: none; }

  .hand-token {
    flex-shrink: 0;
    width: 54px; height: 54px;
    border-radius: 50%;
    border: 3px solid #c9a84c;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .hand-token.selected {
    transform: scale(1.18);
    box-shadow: 0 0 14px 4px #ffd700;
    border-color: #ffd700;
  }
  .hand-token.caesar-t { background: #8b1a1a; }
  .hand-token.pompey-t { background: #1a3a6b; }
  .token-inner {
    display: flex;
    width: 100%; height: 100%;
    align-items: center; justify-content: center;
  }
  .tv { flex: 1; display: flex; align-items: center; justify-content: center;
        font-size: 18px; font-weight: bold; color: #f5f0e8; height: 100%; }
  .tv-l { border-right: 2px solid #c9a84c; }
  .token-icon {
    position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
    font-size: 10px; background: #0e0a04; border-radius: 3px; padding: 0 3px;
    color: #c9a84c; line-height: 14px;
  }
  .empty-hand {
    opacity: 0.35; padding: 14px; font-style: italic; font-size: 13px; white-space: nowrap;
  }

  /* Buttons */
  #actions { display: flex; gap: 6px; margin-top: 4px; }
  .btn {
    flex: 1; min-height: 42px; border: 2px solid #c9a84c; background: #2b1810;
    color: #f5f0e8; font-family: Georgia, serif; font-size: 13px; font-weight: bold;
    border-radius: 6px; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .btn:active { background: #c9a84c; color: #2b1810; }
  .btn:disabled { opacity: 0.3; pointer-events: none; }

  /* Overlay */
  #overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.94);
    z-index: 100; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; cursor: pointer;
  }
  #overlay.show { display: flex; }
  #overlay h2 { font-size: 26px; color: #c9a84c; text-align: center; padding: 0 24px; }
  #overlay p { font-size: 14px; opacity: 0.5; }

  /* Animations */
  @keyframes pulse { 0%,100%{opacity:.25} 50%{opacity:.65} }
  .slot-avail { animation: pulse 1.2s ease-in-out infinite; }

  /* Debug */
  .debug-label {
    font-size: 8px; fill: #ff0; pointer-events: none; font-family: monospace;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <span id="pname" class="player-name caesar">Caesar</span>
      <span id="pbag" class="bag-count">(16 in bag)</span>
    </div>
    <div id="pmarkers" class="markers">Markers: 12</div>
  </div>

  <div id="board-container">
    <div id="board-wrap">
      <img id="board-img" src="caesar-board.jpg" alt="Board">
      <svg id="board-overlay" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <div id="hand-panel">
    <div id="hand-tokens"></div>
    <div id="actions">
      <button class="btn" id="b-draw">Draw</button>
      <button class="btn" id="b-rot">Rotate</button>
      <button class="btn" id="b-mark">Marker</button>
      <button class="btn" id="b-end">End Turn</button>
    </div>
  </div>

  <div id="overlay">
    <h2 id="ov-text">Pass device to Pompey</h2>
    <p>Tap when ready</p>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────
const DEBUG = false; // set true to show slot IDs and coordinates

const P = [
  { name: 'Caesar', cls: 'caesar', bg: '#8b1a1a', hi: '#e55' },
  { name: 'Pompey', cls: 'pompey', bg: '#1a3a6b', hi: '#5a9ee5' },
];

// ── Slot positions (x%, y%) on the board image ──────────────
// Carefully mapped from the board photo. Each slot is a circle on a border.
// type: Sword/Shield/Ship  provinces: [sideA, sideB] for orientation label
const SLOTS = [
  // ── Hispania Ulterior ↔ Hispania Citerior (top row, ~3 slots) ──
  { id:0,  x:27, y:6,  type:'Shield', p:['H.Ult','H.Cit'] },
  { id:1,  x:33, y:6,  type:'Sword',  p:['H.Ult','H.Cit'] },
  { id:2,  x:39, y:6,  type:'Ship',   p:['H.Ult','H.Cit'] },

  // ── Hispania Ulterior ↔ Mauritania (left, 2 slots) ──
  { id:3,  x:16, y:10, type:'Ship',   p:['H.Ult','Maur'] },
  { id:4,  x:16, y:15, type:'Sword',  p:['H.Ult','Maur'] },

  // ── Hispania Citerior ↔ Sardinia (sea, 1 slot) ──
  { id:5,  x:40, y:12, type:'Ship',   p:['H.Cit','Sard'] },

  // ── Hispania Citerior ↔ Gallia (sea top-right, 1 slot) ──
  { id:6,  x:62, y:7,  type:'Ship',   p:['H.Cit','Gall'] },

  // ── Mauritania ↔ Sardinia (sea, 1 slot) ──
  { id:7,  x:28, y:17, type:'Ship',   p:['Maur','Sard'] },

  // ── Mauritania ↔ Numidia (left, 2 slots) ──
  { id:8,  x:14, y:22, type:'Sword',  p:['Maur','Num'] },
  { id:9,  x:20, y:22, type:'Shield', p:['Maur','Num'] },

  // ── Gallia ↔ Gallia Cisalpina (right, 2 slots) ──
  { id:10, x:82, y:12, type:'Sword',  p:['Gall','G.Cis'] },
  { id:11, x:82, y:17, type:'Shield', p:['Gall','G.Cis'] },

  // ── Sardinia ↔ Gallia Cisalpina (sea, 1 slot) ──
  { id:12, x:56, y:15, type:'Ship',   p:['Sard','G.Cis'] },

  // ── Sardinia ↔ Sicilia (sea, 1 slot) ──
  { id:13, x:38, y:24, type:'Ship',   p:['Sard','Sic'] },

  // ── Numidia ↔ Sicilia (sea, 1 slot) ──
  { id:14, x:30, y:30, type:'Ship',   p:['Num','Sic'] },

  // ── Numidia ↔ Africa (left, 2 slots) ──
  { id:15, x:8,  y:34, type:'Sword',  p:['Num','Afr'] },
  { id:16, x:14, y:34, type:'Shield', p:['Num','Afr'] },

  // ── Sicilia ↔ Italia (center, 2 slots) ──
  { id:17, x:48, y:30, type:'Ship',   p:['Sic','Ital'] },
  { id:18, x:54, y:30, type:'Shield', p:['Sic','Ital'] },

  // ── G.Cisalpina ↔ Italia (right, 1 slot) ──
  { id:19, x:66, y:25, type:'Sword',  p:['G.Cis','Ital'] },

  // ── G.Cisalpina ↔ Dalmatia (far right, 1 slot) ──
  { id:20, x:84, y:28, type:'Shield', p:['G.Cis','Dalm'] },

  // ── Italia ↔ Dalmatia (sea, 1 slot) ──
  { id:21, x:74, y:34, type:'Ship',   p:['Ital','Dalm'] },

  // ── Italia ↔ Achaia (sea, 1 slot) ──
  { id:22, x:54, y:39, type:'Ship',   p:['Ital','Ach'] },

  // ── Dalmatia ↔ Macedonia (right, 1 slot) ──
  { id:23, x:86, y:42, type:'Sword',  p:['Dalm','Mac'] },

  // ── Africa ↔ Sicilia (sea, 1 slot) ──
  { id:24, x:22, y:38, type:'Ship',   p:['Afr','Sic'] },

  // ── Africa ↔ Cyrene (left, 1 slot) ──
  { id:25, x:8,  y:48, type:'Sword',  p:['Afr','Cyr'] },

  // ── Achaia ↔ Macedonia (center-right, 1 slot) ──
  { id:26, x:66, y:48, type:'Shield', p:['Ach','Mac'] },

  // ── Achaia ↔ Cyrene (sea, 1 slot) ──
  { id:27, x:24, y:52, type:'Ship',   p:['Ach','Cyr'] },

  // ── Achaia ↔ Creta (sea, 1 slot) ──
  { id:28, x:42, y:56, type:'Ship',   p:['Ach','Cret'] },

  // ── Creta ↔ Aegyptus (sea, 1 slot) ──
  { id:29, x:28, y:66, type:'Ship',   p:['Cret','Aeg'] },

  // ── Creta ↔ Asia (sea, 1 slot) ──
  { id:30, x:54, y:63, type:'Ship',   p:['Cret','Asia'] },

  // ── Cyrene ↔ Aegyptus (left, 1 slot) ──
  { id:31, x:12, y:64, type:'Sword',  p:['Cyr','Aeg'] },

  // ── Asia ↔ Macedonia (sea, 1 slot) ──
  { id:32, x:74, y:58, type:'Ship',   p:['Asia','Mac'] },

  // ── Aegyptus ↔ Syria (bottom-left, 1 slot) ──
  { id:33, x:24, y:84, type:'Sword',  p:['Aeg','Syr'] },

  // ── Asia ↔ Syria (bottom-right, 1 slot) ──
  { id:34, x:62, y:80, type:'Shield', p:['Asia','Syr'] },

  // ── Aegyptus ↔ Asia? or Aegyptus ↔ Creta extra? ──
  // Additional slots I may have missed - these can be added after visual check
];

// Province bonus-token center positions
const PROVS = [
  { n:'Hisp. Ult.',   x:24, y:8  },
  { n:'Hisp. Cit.',   x:46, y:4  },
  { n:'Mauritania',   x:17, y:18 },
  { n:'Gallia',        x:82, y:6  },
  { n:'Sardinia',      x:42, y:17 },
  { n:'G. Cisalpina',  x:80, y:22 },
  { n:'Numidia',       x:20, y:28 },
  { n:'Sicilia',       x:40, y:32 },
  { n:'Italia',        x:58, y:33 },
  { n:'Africa',        x:10, y:41 },
  { n:'Dalmatia',      x:86, y:35 },
  { n:'Achaia',        x:44, y:47 },
  { n:'Macedonia',     x:76, y:50 },
  { n:'Cyrene',        x:12, y:55 },
  { n:'Creta',         x:42, y:62 },
  { n:'Aegyptus',      x:14, y:75 },
  { n:'Asia',          x:60, y:72 },
  { n:'Syria',         x:42, y:88 },
];

const ICONS = { Sword:'\u2694\uFE0F', Shield:'\uD83D\uDEE1\uFE0F', Ship:'\u2693', Wild:'\u2618\uFE0F' };
const BONUS_ICONS = { Tactics:'\u26A1', Wealth:'\uD83D\uDCB0', Might:'\uD83D\uDCAA', Senate:'\uD83C\uDFDB\uFE0F' };

function makeTokens() {
  const t = [];
  for (const type of ['Sword','Shield']) {
    t.push({type,v:[5,1]},{type,v:[5,1]},{type,v:[4,2]},{type,v:[4,2]},{type,v:[3,3]});
  }
  t.push({type:'Ship',v:[5,1]},{type:'Ship',v:[4,2]},{type:'Ship',v:[3,3]});
  t.push({type:'Wild',v:[3,1]},{type:'Wild',v:[2,2]},{type:'Wild',v:[2,2]});
  return t; // 16 tokens
}

// ── State ───────────────────────────────────────────────────
const S = {
  cp: 0,         // current player
  bags: [[],[]],
  hands: [[],[]],
  board: [],     // {tok, slotId, rot, pl}
  markers: [],   // {pl, x, y}
  bonus: [],     // {type, pi, claimed}
  sel: null,     // selected hand index or -1 for marker
  selMarker: false,
  mrem: [12,12], // markers remaining
};

function shuffle(a) {
  for (let i=a.length-1;i>0;i--) { const j=Math.random()*i+1|0;[a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function init() {
  S.cp=0;
  S.bags=[shuffle(makeTokens()),shuffle(makeTokens())];
  S.hands=[[],[]];
  S.board=[];
  S.markers=[];
  S.sel=null;
  S.selMarker=false;
  S.mrem=[12,12];

  // Bonus tokens
  const types=shuffle(['Tactics','Wealth','Might','Tactics','Wealth','Might',
    'Tactics','Wealth','Might','Wealth','Might','Tactics','Might']);
  S.bonus=[];
  for(let i=0;i<PROVS.length;i++){
    if(i===8) S.bonus.push({type:'Senate',pi:i,claimed:false});
    else if(types.length) S.bonus.push({type:types.pop(),pi:i,claimed:false});
  }
  render();
}

// ── Image rect tracking ─────────────────────────────────────
let IR={l:0,t:0,w:1,h:1};

function updIR() {
  const img=document.getElementById('board-img');
  if(!img||!img.complete) return;
  const r=img.getBoundingClientRect();
  const c=document.getElementById('board-container').getBoundingClientRect();
  IR={l:r.left-c.left, t:r.top-c.top, w:r.width, h:r.height};

  // Size the overlay to match the image exactly
  const wrap=document.getElementById('board-wrap');
  const ov=document.getElementById('board-overlay');
  ov.style.width=r.width+'px';
  ov.style.height=r.height+'px';
  ov.setAttribute('viewBox',`0 0 ${r.width} ${r.height}`);
}

function p2px(xp,yp) { return {x:xp/100*IR.w, y:yp/100*IR.h}; }
function px2p(x,y) { return {x:x/IR.w*100, y:y/IR.h*100}; }

// ── Actions ─────────────────────────────────────────────────
function draw() {
  if(!S.bags[S.cp].length) return;
  S.hands[S.cp].push({...S.bags[S.cp].pop(), rot:false});
  S.sel=null; S.selMarker=false;
  render();
}

function rotate() {
  if(S.sel===null||S.selMarker) return;
  const t=S.hands[S.cp][S.sel];
  if(t) { t.rot=!t.rot; render(); }
}

function selHand(i) {
  S.selMarker=false;
  S.sel=(S.sel===i)?null:i;
  render();
}

function selMark() {
  if(S.mrem[S.cp]<=0) return;
  S.selMarker=true; S.sel=-1;
  render();
}

function placeOnSlot(sid) {
  const ex=S.board.findIndex(b=>b.slotId===sid);
  // Pick up existing
  if(ex!==-1) {
    const b=S.board[ex];
    if(b.pl!==S.cp) return; // can't pick up opponent's token
    S.hands[S.cp].push({type:b.tok.type, v:[...b.tok.v], rot:b.rot});
    S.board.splice(ex,1);
    S.sel=null; render();
    return;
  }
  // Place selected
  if(S.sel===null||S.selMarker) return;
  const t=S.hands[S.cp][S.sel];
  S.board.push({tok:{type:t.type,v:[...t.v]}, slotId:sid, rot:t.rot, pl:S.cp});
  S.hands[S.cp].splice(S.sel,1);
  S.sel=null; render();
}

function boardClick(e) {
  updIR();
  const c=document.getElementById('board-container').getBoundingClientRect();
  const cx=e.clientX-c.left-IR.l, cy=e.clientY-c.top-IR.t;

  // Check slots
  for(const s of SLOTS) {
    const sp=p2px(s.x,s.y);
    if(Math.hypot(cx-sp.x,cy-sp.y)<18) { placeOnSlot(s.id); return; }
  }

  // Place marker at click position
  if(S.selMarker && S.sel===-1) {
    const pct=px2p(cx,cy);
    S.markers.push({pl:S.cp, x:pct.x, y:pct.y});
    S.mrem[S.cp]--;
    S.sel=null; S.selMarker=false;
    render(); return;
  }

  // Pick up marker
  for(let i=S.markers.length-1;i>=0;i--) {
    const m=S.markers[i];
    if(m.pl!==S.cp) continue;
    const mp=p2px(m.x,m.y);
    if(Math.hypot(cx-mp.x,cy-mp.y)<16) {
      S.markers.splice(i,1);
      S.mrem[S.cp]++;
      render(); return;
    }
  }

  // Claim bonus token
  for(const b of S.bonus) {
    if(b.claimed) continue;
    const pr=PROVS[b.pi];
    const bp=p2px(pr.x,pr.y);
    if(Math.hypot(cx-bp.x,cy-bp.y)<16) {
      b.claimed=true;
      render(); return;
    }
  }
}

function endTurn() {
  S.sel=null; S.selMarker=false;
  const next=1-S.cp;
  document.getElementById('ov-text').textContent=`Pass device to ${P[next].name}`;
  const ov=document.getElementById('overlay');
  ov.classList.add('show');
  ov.onclick=()=>{ ov.classList.remove('show'); S.cp=next; render(); };
}

function reset() { if(confirm('Reset game?')) init(); }

// ── Long press for rotate on board ──────────────────────────
let lpt=null, lpid=null;

function touchStart(e) {
  if(e.touches.length!==1) return;
  const t=e.touches[0];
  updIR();
  const c=document.getElementById('board-container').getBoundingClientRect();
  const cx=t.clientX-c.left-IR.l, cy=t.clientY-c.top-IR.t;

  for(const b of S.board) {
    if(b.pl!==S.cp) continue;
    const sl=SLOTS.find(s=>s.id===b.slotId);
    if(!sl) continue;
    const sp=p2px(sl.x,sl.y);
    if(Math.hypot(cx-sp.x,cy-sp.y)<22) {
      lpid=b.slotId;
      lpt=setTimeout(()=>{ b.rot=!b.rot; lpt=null; lpid=null; render(); },400);
      return;
    }
  }
}
function touchEnd() { if(lpt){clearTimeout(lpt);lpt=null;} lpid=null; }
function touchMove() { if(lpt){clearTimeout(lpt);lpt=null;} }

// Long press on hand token to rotate
let hlt=null;
function hts(i) {
  hlt=setTimeout(()=>{
    const t=S.hands[S.cp][i];
    if(t){t.rot=!t.rot; render();}
    hlt=null;
  },400);
}
function hte() { if(hlt){clearTimeout(hlt);hlt=null;} }

// ── Render ──────────────────────────────────────────────────
function render() {
  updIR();
  const p=S.cp, pl=P[p];

  // Header
  document.getElementById('pname').textContent=pl.name;
  document.getElementById('pname').className='player-name '+pl.cls;
  document.getElementById('pbag').textContent=`(${S.bags[p].length} in bag)`;
  document.getElementById('pmarkers').textContent=`Markers: ${S.mrem[p]}/12`;

  // Buttons
  document.getElementById('b-draw').disabled=!S.bags[p].length;
  document.getElementById('b-rot').disabled=(S.sel===null||S.selMarker);
  document.getElementById('b-mark').disabled=S.mrem[p]<=0;

  renderOverlay();
  renderHand();
}

function renderOverlay() {
  updIR();
  const svg=document.getElementById('board-overlay');
  const hasSel=S.sel!==null&&!S.selMarker;
  let h='';

  // Slot targets
  for(const s of SLOTS) {
    const {x,y}=p2px(s.x,s.y);
    const occ=S.board.some(b=>b.slotId===s.id);
    if(!occ && hasSel) {
      h+=`<circle class="hit slot-avail" cx="${x}" cy="${y}" r="12"
        fill="rgba(201,168,76,0.35)" stroke="#c9a84c" stroke-width="1.5"
        data-s="${s.id}"/>`;
    } else if(!occ) {
      h+=`<circle class="hit" cx="${x}" cy="${y}" r="12"
        fill="transparent" data-s="${s.id}"/>`;
    }
    if(DEBUG) {
      h+=`<text class="debug-label" x="${x+14}" y="${y+3}">${s.id} (${s.x},${s.y})</text>`;
    }
  }

  // Placed tokens
  for(const b of S.board) {
    const sl=SLOTS.find(s=>s.id===b.slotId);
    if(!sl) continue;
    const {x,y}=p2px(sl.x,sl.y);
    const c=P[b.pl];
    const v=b.rot?[b.tok.v[1],b.tok.v[0]]:b.tok.v;
    const r=13;
    h+=`<g class="hit" data-s="${b.slotId}">`;
    h+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${c.bg}" stroke="#c9a84c" stroke-width="2"/>`;
    h+=`<line x1="${x}" y1="${y-r}" x2="${x}" y2="${y+r}" stroke="#c9a84c" stroke-width="1.5"/>`;
    h+=`<text x="${x-r*.5}" y="${y+4}" text-anchor="middle" fill="#f5f0e8" font-size="11" font-weight="bold" font-family="Georgia">${v[0]}</text>`;
    h+=`<text x="${x+r*.5}" y="${y+4}" text-anchor="middle" fill="#f5f0e8" font-size="11" font-weight="bold" font-family="Georgia">${v[1]}</text>`;
    h+=`</g>`;
  }

  // Control markers
  for(let i=0;i<S.markers.length;i++) {
    const m=S.markers[i];
    const {x,y}=p2px(m.x,m.y);
    h+=`<g class="hit" data-mi="${i}">`;
    h+=`<circle cx="${x}" cy="${y}" r="9" fill="${P[m.pl].bg}" stroke="#c9a84c" stroke-width="2"/>`;
    h+=`<text x="${x}" y="${y+3.5}" text-anchor="middle" fill="#c9a84c" font-size="9" font-weight="bold" font-family="Georgia">M</text>`;
    h+=`</g>`;
  }

  // Bonus tokens
  for(const b of S.bonus) {
    if(b.claimed) continue;
    const pr=PROVS[b.pi];
    const {x,y}=p2px(pr.x,pr.y);
    h+=`<circle class="hit" cx="${x}" cy="${y}" r="11" fill="#d4b44c" stroke="#8a7428" stroke-width="1.5" data-bi="${b.pi}"/>`;
    h+=`<text x="${x}" y="${y+4}" text-anchor="middle" font-size="10" pointer-events="none">${BONUS_ICONS[b.type]||'?'}</text>`;
  }

  svg.innerHTML=h;

  // Attach listeners
  svg.querySelectorAll('[data-s]').forEach(el=>{
    const sid=+el.dataset.s;
    el.addEventListener('click',e=>{e.stopPropagation();placeOnSlot(sid);});
  });
  svg.querySelectorAll('[data-bi]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const b=S.bonus.find(b=>b.pi===+el.dataset.bi);
      if(b&&!b.claimed){b.claimed=true;render();}
    });
  });
}

function renderHand() {
  const hand=S.hands[S.cp];
  const ct=document.getElementById('hand-tokens');
  let h='';
  const tcls=S.cp===0?'caesar-t':'pompey-t';

  for(let i=0;i<hand.length;i++) {
    const t=hand[i];
    const v=t.rot?[t.v[1],t.v[0]]:t.v;
    const sel=(S.sel===i&&!S.selMarker)?' selected':'';
    h+=`<div class="hand-token ${tcls}${sel}" data-h="${i}">
      <div class="token-inner"><div class="tv tv-l">${v[0]}</div><div class="tv">${v[1]}</div></div>
      <span class="token-icon">${ICONS[t.type]||t.type}</span></div>`;
  }

  if(!hand.length) h='<div class="empty-hand">No tokens — draw from bag</div>';
  ct.innerHTML=h;

  ct.querySelectorAll('[data-h]').forEach(el=>{
    const i=+el.dataset.h;
    el.addEventListener('click',()=>selHand(i));
    el.addEventListener('touchstart',()=>hts(i),{passive:true});
    el.addEventListener('touchend',hte);
    el.addEventListener('touchmove',hte,{passive:true});
  });
}

// ── Event wiring ────────────────────────────────────────────
document.getElementById('b-draw').onclick=draw;
document.getElementById('b-rot').onclick=rotate;
document.getElementById('b-mark').onclick=selMark;
document.getElementById('b-end').onclick=endTurn;

const bc=document.getElementById('board-container');
bc.addEventListener('click',boardClick);
bc.addEventListener('touchstart',touchStart,{passive:true});
bc.addEventListener('touchend',touchEnd);
bc.addEventListener('touchmove',touchMove,{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R') rotate();
  if(e.key==='Escape'){S.sel=null;S.selMarker=false;render();}
});

window.addEventListener('resize',()=>{updIR();render();});

const img=document.getElementById('board-img');
if(img.complete) init(); else img.onload=init;
img.onerror=()=>{
  document.getElementById('board-wrap').innerHTML=
    '<div style="color:#c9a84c;text-align:center;padding:40px"><h2>Board image not found</h2><p>Place caesar-board.jpg next to this HTML file</p></div>';
};
</script>

</html>
